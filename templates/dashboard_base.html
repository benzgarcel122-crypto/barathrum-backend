{% extends "base.html" %}

{% block nav %}
<nav class="app-nav">
  <span class="sidebar-brand">Barathrum</span>
  <a href="{% url 'dashboard:home' %}" class="{% if active_nav == 'dashboard' %}active{% endif %}">
    <span class="nav-icon">🏠</span><span>Dashboard</span>
  </a>
  <a href="{% url 'dashboard:generate_license' %}" class="{% if active_nav == 'generate_license' %}active{% endif %}">
    <span class="nav-icon">🔑</span><span>Generate License Key</span>
  </a>
  <a href="{% url 'dashboard:send_points' %}" class="{% if active_nav == 'send_points' %}active{% endif %}">
    <span class="nav-icon">💸</span><span>Send Points</span>
  </a>
  <a href="{% url 'dashboard:account_settings' %}" class="{% if active_nav == 'account' %}active{% endif %}">
    <span class="nav-icon">👤</span><span>Account</span>
  </a>
  <form method="post" action="{% url 'logout' %}" class="nav-logout-form">
    {% csrf_token %}
    <button type="submit" class="nav-logout-btn">
      <span class="nav-icon">🚪</span><span>Log Out</span>
    </button>
  </form>
</nav>
{% endblock %}
