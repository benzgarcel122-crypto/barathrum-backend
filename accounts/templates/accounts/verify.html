{% extends "base.html" %}
{% block title %}Enter code — Barathrum{% endblock %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 40px auto 0;">
  <h1 style="font-size:1.2rem; margin-top:0;">Enter your code</h1>
  <p class="text-muted">We sent a 6-digit code to <strong>{{ phone_number }}</strong>.</p>

  <form method="post" action="{% url 'verify' %}">
    {% csrf_token %}
    <input type="hidden" name="phone_number" value="{{ phone_number }}">
    <input type="hidden" name="next" value="{{ next_value|default:'' }}">
    <div class="field">
      <label for="id_code">6-digit code</label>
      <input type="text" id="id_code" name="code" inputmode="numeric" maxlength="6"
             placeholder="000000" autofocus required>
      {% if form_errors.code %}<div class="field-error">{{ form_errors.code }}</div>{% endif %}
    </div>
    <button type="submit" class="btn btn-block">Verify</button>
  </form>
</div>
{% endblock %}
